name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build IsoForge.csproj -c Debug --nologo

      - name: SmokeTest (validação)
        run: dotnet run --project SmokeTest -c Debug --nologo
