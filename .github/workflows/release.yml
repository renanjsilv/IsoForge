name: Release

# Ao criar uma tag vX.Y.Z, compila o exe + instalador e publica a release com o .exe.
# Fluxo para lançar uma nova versão:  git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo + tags (para gerar as notas)

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derivar versão da tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Versão: $v"

      - name: Gerar notas da versão (a partir dos commits desde a tag anterior)
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = (git describe --tags --abbrev=0 "$tag^" 2>$null)
          $range = if ($prev) { "$prev..$tag" } else { $tag }
          $log = (git log $range --no-merges --pretty=format:"- %s") -join "`n"
          if ([string]::IsNullOrWhiteSpace($log)) { $log = "- Atualização de manutenção." }
          Write-Host $log
          "notes<<__EOF__" >> $env:GITHUB_OUTPUT
          "$log" >> $env:GITHUB_OUTPUT
          "__EOF__" >> $env:GITHUB_OUTPUT

      - name: SmokeTest (validação)
        run: dotnet run --project SmokeTest -c Debug --nologo

      - name: Publicar executável único
        run: dotnet publish IsoForge.csproj -c Release --nologo -p:Version=${{ steps.ver.outputs.version }}

      - name: Instalar Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Gerar instalador
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.ver.outputs.version }} installer\IsoForge.iss

      - name: Publicar release com o instalador
        uses: softprops/action-gh-release@v2
        with:
          name: IsoForge ${{ steps.ver.outputs.version }}
          body: |
            ## Novidades da versão ${{ steps.ver.outputs.version }}

            ${{ steps.notes.outputs.notes }}
          files: dist/IsoForge-Setup.exe
